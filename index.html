<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTranslate - Language Tool</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-slate-800">

    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-gradient-to-r align-middle from-blue-600 to-indigo-700 p-6 text-white flex items-center gap-3">
            <i class="fa-solid fa-language text-3xl"></i>
            <div>
                <h1 class="text-2xl font-bold tracking-tight">QuickTranslate</h1>
                <p class="text-blue-100 text-sm">CodeAlpha AI Internship - Task 1</p>
            </div>
        </div>

        <!-- Translation Interface -->
        <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-200">
            
            <!-- Source Text Panel -->
            <div class="p-6 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <label for="sourceLanguage" class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Source Language</label>
                    <select id="sourceLanguage" class="bg-slate-100 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="en" selected>English</option>
                        <option value="es">Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="zh">Chinese</option>
                    </select>
                </div>
                <textarea id="sourceText" placeholder="Type or paste your text here..." class="w-full h-48 resize-none border-0 p-0 text-lg placeholder-slate-400 focus:ring-0 focus:outline-none" maxlength="1000"></textarea>
                <div class="flex justify-between items-center text-xs text-slate-400 border-t border-slate-100 pt-3">
                    <span id="charCount">0 / 1000</span>
                    <button id="clearBtn" class="text-slate-500 hover:text-red-500 font-medium transition flex items-center gap-1">
                        <i class="fa-solid fa-trash-can"></i> Clear
                    </button>
                </div>
            </div>

            <!-- Target Text Panel -->
            <div class="p-6 flex flex-col gap-4 bg-slate-50/50">
                <div class="flex items-center justify-between">
                    <label for="targetLanguage" class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Target Language</label>
                    <select id="targetLanguage" class="bg-slate-100 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="en">English</option>
                        <option value="es" selected>Spanish</option>
                        <option value="fr">French</option>
                        <option value="de">German</option>
                        <option value="hi">Hindi</option>
                        <option value="zh">Chinese</option>
                    </select>
                </div>
                <div id="targetTextPlaceholder" class="w-full h-48 text-lg text-slate-400 select-none">Translation will appear here...</div>
                <div id="targetText" class="w-full h-48 text-lg hidden overflow-y-auto whitespace-pre-wrap"></div>
                
                <!-- Action Buttons (Copy & TTS) -->
                <div class="flex justify-end gap-3 border-t border-slate-100 pt-3 text-slate-500">
                    <button id="ttsBtn" class="p-2 hover:bg-slate-200 rounded-lg transition disabled:opacity-50" title="Listen" disabled>
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                    <button id="copyBtn" class="p-2 hover:bg-slate-200 rounded-lg transition disabled:opacity-50" title="Copy text" disabled>
                        <i class="fa-solid fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Bar Footer -->
        <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-end">
            <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-xl shadow-md hover:shadow-lg transition flex items-center gap-2 cursor-pointer">
                <span>Translate</span>
                <i class="fa-solid fa-arrow-right" id="btnIcon"></i>
            </button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        const sourceText = document.getElementById('sourceText');
        const targetText = document.getElementById('targetText');
        const targetPlaceholder = document.getElementById('targetTextPlaceholder');
        const sourceLang = document.getElementById('sourceLanguage');
        const targetLang = document.getElementById('targetLanguage');
        const translateBtn = document.getElementById('translateBtn');
        const btnIcon = document.getElementById('btnIcon');
        const charCount = document.getElementById('charCount');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const ttsBtn = document.getElementById('ttsBtn');

        // Update character counter
        sourceText.addEventListener('input', () => {
            charCount.textContent = `${sourceText.value.length} / 1000`;
        });

        // Clear button implementation
        clearBtn.addEventListener('click', () => {
            sourceText.value = '';
            targetText.textContent = '';
            charCount.textContent = '0 / 1000';
            toggleOutputState(false);
        });

        function toggleOutputState(hasContent) {
            if(hasContent) {
                targetPlaceholder.classList.add('hidden');
                targetText.classList.remove('hidden');
                copyBtn.removeAttribute('disabled');
                ttsBtn.removeAttribute('disabled');
            } else {
                targetPlaceholder.classList.remove('hidden');
                targetText.classList.add('hidden');
                copyBtn.setAttribute('disabled', true);
                ttsBtn.setAttribute('disabled', true);
            }
        }

        // Translation Function (API Integration)
        async function translate() {
            const text = sourceText.value.trim();
            if (!text) {
                alert('Please enter some text to translate.');
                return;
            }

            // UI Loading State
            translateBtn.disabled = true;
            translateBtn.classList.add('opacity-75', 'cursor-not-allowed');
            btnIcon.className = "fa-solid fa-spinner animate-spin";

            const apiURL = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang.value}|${targetLang.value}`;

            try {
                const response = await fetch(apiURL);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                if(data.responseData) {
                    targetText.textContent = data.responseData.translatedText;
                    toggleOutputState(true);
                } else {
                    throw new Error('Translation failed');
                }
            } catch (error) {
                console.error(error);
                targetText.textContent = "Error: Failed to fetch translation. Please try again.";
                targetText.classList.add('text-red-500');
                toggleOutputState(true);
            } finally {
                // Restore Button State
                translateBtn.disabled = false;
                translateBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnIcon.className = "fa-solid fa-arrow-right";
            }
        }

        translateBtn.addEventListener('click', translate);

        // Copy Button UX Feature
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(targetText.textContent).then(() => {
                const icon = copyBtn.querySelector('i');
                icon.className = "fa-solid fa-check text-green-500";
                setTimeout(() => icon.className = "fa-solid fa-copy", 2000);
            });
        });

        // Text-to-Speech UX Feature
        ttsBtn.addEventListener('click', () => {
            const utterance = new SpeechSynthesisUtterance(targetText.textContent);
            utterance.lang = targetLang.value;
            window.speechSynthesis.speak(utterance);
        });
    </script>
</body>
</html>
